  nodes: [TermTag!]!
  pageInfo: ConnectionPageInfo!
}

type TermTagEdge implements Edge {
  cursor: Cursor!
  node: TermTag!
}

type Mutation {
  _: Boolean!
}

type Subscription {
  _: Boolean!
}

type DateRange {
  start: DateTime
  end: DateTime
}

type File {
  name: String
  url: String!
  size: Int!
  mime: String
  description: String
}

type ImageStyle implements ImageStyleInterface {
  id: ID!
  uuid: ID!
}

interface ImageStyleInterface {
  id: ID!
  uuid: ID!
}

union ImageStyleUnion = ImageStyle

input KeyValueInput {
  key: String!
  value: String
}

union MenuUnion = Menu

enum SortDirection {
  ASC
  DESC
}

type UnsupportedType {
  unsupported: Boolean
}
