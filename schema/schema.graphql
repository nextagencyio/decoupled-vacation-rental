type Query {
  node(id: ID!, revision: ID): NodeUnion
  paragraph(id: ID!, revision: ID): ParagraphUnion
  term(id: ID!, revision: ID): TermUnion
  menu(name: MenuAvailable!): Menu
  info: SchemaInformation!
  nodeAmenities(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeAmenityConnection!
  nodeAttractions(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeAttractionConnection!
  nodeHomepages(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodeHomepageConnection!
  nodePages(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodePageConnection!
  nodeProperties(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): NodePropertyConnection!
  paragraphStatItems(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): ParagraphStatItemConnection!
  termTags(after: Cursor, before: Cursor, first: Int, last: Int, reverse: Boolean, sortKey: ConnectionSortKeys): TermTagConnection!
  preview(id: ID!, token: String, langcode: String): NodeUnion
  route(path: String!, revision: ID): RouteUnion
}

union NodeUnion = NodeAmenity | NodeAttraction | NodeHomepage | NodePage | NodeProperty

type NodeAmenity implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  amenityCategory: [TermUnion!]
  availability: String
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  image: Image
  included: Boolean
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

interface NodeInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  created: DateTime!
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

type DateTime {
  timestamp: Timestamp!
  timezone: TimeZone!
  offset: UtcOffset!
  time: Time!
}

type Language {
  id: ID
  name: String
  direction: String
}

interface EdgeNode {
  id: ID!
}

union TermUnion = TermAmenityCategory | TermAttractionType | TermPropertyType | TermTag

type TermAmenityCategory implements TermInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  description: Text!
  langcode: Language!
  name: String!
  parent: TermUnion
  path: String
  status: Boolean!
  weight: Int!
}

interface TermInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  description: Text!
  langcode: Language!
  name: String!
  parent: TermUnion
  path: String
  status: Boolean!
  weight: Int!
}

type Text {
  value: String
  processed: Html
  format: String
}

type TermAttractionType implements TermInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  description: Text!
  langcode: Language!
  name: String!
  parent: TermUnion
  path: String
  status: Boolean!
  weight: Int!
}

type TermPropertyType implements TermInterface {
  id: ID!
  uuid: ID!
  changed: DateTime!
  description: Text!
  langcode: Language!
  name: String!
  parent: TermUnion
  path: String
  status: Boolean!
  weight: Int!
}

type TermTag implements TermInterface & EdgeNode {
  id: ID!
  uuid: ID!
  changed: DateTime!
  description: Text!
  langcode: Language!
  name: String!
  parent: TermUnion
  path: String
  status: Boolean!
  weight: Int!
}

type TextSummary {
  value: String
  processed: Html
  format: String
  summary: Html
}

type Image {
  url: String!
  width: Int!
  height: Int!
  alt: String
  title: String
  size: Int!
  mime: String
  variations(styles: [ImageStyleAvailable]): [ImageStyleDerivative!]
}

enum ImageStyleAvailable {
  LARGE
  MEDIA_LIBRARY
  MEDIUM
  THUMBNAIL
  WIDE
}

type ImageStyleDerivative {
  name: String!
  url: String!
  width: Int!
  height: Int!
}

type NodeAttraction implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  address: String
  attractionType: [TermUnion!]
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  distance: String
  image: Image
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

type NodeHomepage implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  changed: DateTime!
  created: DateTime!
  ctaDescription: Text
  ctaPrimary: String
  ctaSecondary: String
  ctaTitle: String
  featuredItemsTitle: String
  heroDescription: Text
  heroSubtitle: String
  heroTitle: String
  langcode: Language!
  path: String
  promote: Boolean!
  statsItems: [ParagraphUnion!]
  status: Boolean!
  sticky: Boolean!
  title: String!
}

union ParagraphUnion = ParagraphStatItem

type ParagraphStatItem implements ParagraphInterface & EdgeNode {
  id: ID!
  uuid: ID!
  created: DateTime!
  label: String
  langcode: Language!
  number: String
  status: Boolean!
}

interface ParagraphInterface {
  id: ID!
  uuid: ID!
  created: DateTime!
  langcode: Language!
  status: Boolean!
}

type NodePage implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  langcode: Language!
  path: String
  promote: Boolean!
  status: Boolean!
  sticky: Boolean!
  title: String!
}

type NodeProperty implements NodeInterface & EdgeNode {
  id: ID!
  uuid: ID!
  bathrooms: String
  bedrooms: String
  body: TextSummary
  changed: DateTime!
  created: DateTime!
  featured: Boolean
  image: Image
  langcode: Language!
  locationArea: String
  maxGuests: String
  nightlyRate: String
  path: String
  promote: Boolean!
  propertyFeatures: [String!]
  propertyType: [TermUnion!]
