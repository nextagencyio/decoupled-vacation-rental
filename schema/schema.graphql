}

type NodePageConnection implements Connection {
  edges: [NodePageEdge!]!
  nodes: [NodePage!]!
  pageInfo: ConnectionPageInfo!
}

type NodePageEdge implements Edge {
  cursor: Cursor!
  node: NodePage!
}

type NodePropertyConnection implements Connection {
  edges: [NodePropertyEdge!]!
  nodes: [NodeProperty!]!
  pageInfo: ConnectionPageInfo!
}

type NodePropertyEdge implements Edge {
  cursor: Cursor!
  node: NodeProperty!
}

type ParagraphStatItemConnection implements Connection {
  edges: [ParagraphStatItemEdge!]!
  nodes: [ParagraphStatItem!]!
  pageInfo: ConnectionPageInfo!
}

type ParagraphStatItemEdge implements Edge {
