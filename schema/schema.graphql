  sticky: Boolean!
  title: String!
}

enum MenuAvailable {
  MAIN
}

type Menu implements MenuInterface {
  id: ID!
  uuid: ID!
  items: [MenuItem!]!
  name: String!
}

interface MenuInterface {
  id: ID!
  uuid: ID!
  items: [MenuItem!]!
  name: String!
}

type MenuItem {
  id: ID!
  title: String!
  description: String
  url: String
  langcode: Language!
  internal: Boolean!
  expanded: Boolean!
  attributes: MenuItemAttributes!
  children: [MenuItem!]!
  route: RouteUnion
}

type MenuItemAttributes {
  class: String
}

union RouteUnion = RouteInternal | RouteExternal

type RouteInternal implements Route {
  url: String!
  internal: Boolean!
  breadcrumbs: [Link!]
  entity: RouteEntityUnion
}

interface Route {
  url: String!
  internal: Boolean!
}

type Link {
  title: String
  url: String
  internal: Boolean!
}

union RouteEntityUnion = NodeAmenity | NodeAttraction | NodeHomepage | NodePage | NodeProperty

type RouteExternal implements Route {
  url: String!
  internal: Boolean!
}

type SchemaInformation {
  description: String
  home: String
  name: String
  slogan: String
  version: String
}

enum ConnectionSortKeys {
  CREATED_AT
  UPDATED_AT
  TITLE
  STICKY
  PROMOTED
  WEIGHT
}

type NodeAmenityConnection implements Connection {
  edges: [NodeAmenityEdge!]!
  nodes: [NodeAmenity!]!
  pageInfo: ConnectionPageInfo!
}

interface Connection {
  edges: [Edge!]!
  nodes: [EdgeNode!]!
  pageInfo: ConnectionPageInfo!
}

interface Edge {
  cursor: Cursor!
  node: EdgeNode!
}

type ConnectionPageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: Cursor
  endCursor: Cursor
}

type NodeAmenityEdge implements Edge {
  cursor: Cursor!
  node: NodeAmenity!
}

type NodeAttractionConnection implements Connection {
  edges: [NodeAttractionEdge!]!
  nodes: [NodeAttraction!]!
  pageInfo: ConnectionPageInfo!
}

type NodeAttractionEdge implements Edge {
  cursor: Cursor!
